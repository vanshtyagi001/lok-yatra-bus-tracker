<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Saathi - Live Bus Tracking</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --color-text: #0f172a;
            --color-text-secondary: #64748b;
            --color-border: #e2e8f0;
            --color-surface: #ffffff;
            --color-bg: #f4f6f9;
            --color-accent: #1e293b;
            --color-accent-hover: #0f172a;
            --color-green: #22c55e;
            --color-red: #ef4444;
            --radius: 12px;
            --radius-lg: 20px;
        }

        html,
        body {
            height: 100%;
            font-family: var(--font);
            color: var(--color-text);
            -webkit-font-smoothing: antialiased;
            background-color: var(--color-bg);
        }

        /* ─── Navbar tweak: transparent on hero ── */
        /* Navbar styles are injected by navbar.js */

        /* ─── Entrance Animations ──────────────── */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50%       { opacity: 1;   transform: scale(1.4); }
        }
        @keyframes floatParticle {
            0%   { transform: translateY(0)   translateX(0)   scale(1);   opacity: 0.18; }
            33%  { transform: translateY(-18px) translateX(10px) scale(1.1); opacity: 0.28; }
            66%  { transform: translateY(-8px)  translateX(-6px) scale(0.9); opacity: 0.14; }
            100% { transform: translateY(0)   translateX(0)   scale(1);   opacity: 0.18; }
        }

        /* ─── Hero Section ───────────────────── */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 32px 72px;
            background-image: url('/images/login-panel-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            text-align: center;
            overflow: hidden;
        }

        /* Multi-layer dark gradient overlay */
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%,   rgba(30,41,80,0.55) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 80% 100%, rgba(15,23,42,0.5)  0%, transparent 70%),
                linear-gradient(170deg, rgba(0,0,0,0.88) 0%, rgba(5,5,10,0.78) 55%, rgba(0,0,0,0.92) 100%);
            z-index: 0;
        }

        /* Floating ambient particles */
        .hero-particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            pointer-events: none;
            z-index: 0;
            animation: floatParticle linear infinite;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 100%;
            animation: fadeSlideUp 0.7s ease both;
        }

        /* Badge */
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            padding: 7px 18px;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 28px;
            backdrop-filter: blur(6px);
        }

        .hero-badge svg {
            animation: pulseDot 2s ease-in-out infinite;
            color: #4ade80;
        }

        .hero h1 {
            font-size: clamp(2.1rem, 4.5vw, 3.4rem);
            font-weight: 800;
            color: #ffffff;
            line-height: 1.15;
            letter-spacing: -1.2px;
            margin-bottom: 18px;
        }

        .hero h1 span {
            color: rgba(255, 255, 255, 0.35);
        }

        .hero > .hero-content > p {
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.48);
            line-height: 1.75;
            margin-bottom: 44px;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ─── Search Card ─────────────────────── */
        .search-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 32px 32px 24px;
            box-shadow:
                0 1px 0 rgba(255,255,255,0.8) inset,
                0 28px 72px rgba(0, 0, 0, 0.38),
                0 6px 20px rgba(0, 0, 0, 0.14);
            width: 100%;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.55);
            transition: box-shadow 0.3s;
        }

        .search-card:focus-within {
            box-shadow:
                0 1px 0 rgba(255,255,255,0.8) inset,
                0 32px 80px rgba(0, 0, 0, 0.42),
                0 6px 24px rgba(0, 0, 0, 0.16);
        }

        /* Card header row */
        .search-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-card-header-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(15,23,42,0.25);
        }

        .search-card-header-text { flex: 1; }

        .search-card-header-text strong {
            display: block;
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--color-text);
            letter-spacing: -0.3px;
        }

        .search-card-header-text span {
            font-size: 0.78rem;
            color: var(--color-text-secondary);
        }

        /* Live status badge inside header */
        .search-card-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 999px;
            padding: 5px 14px;
            font-size: 0.72rem;
            font-weight: 700;
            color: #16a34a;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .search-card-status::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulseDot 1.8s ease-in-out infinite;
        }

        /* ── Search row: horizontal FROM — swap — TO ── */
        .search-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: end;
            gap: 14px;
            margin-bottom: 20px;
        }

        .input-group { position: relative; }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* Coloured label dots */
        .label-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .label-dot.from { background: var(--color-green); }
        .label-dot.to   { background: var(--color-red); }

        /* Card-style input wraps */
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            background: #f4f6fa;
            border: 1.5px solid #e8edf4;
            border-radius: 16px;
            padding: 0 18px;
            height: 64px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            cursor: text;
        }

        .input-wrap:hover {
            border-color: #d0d9e8;
        }

        .input-wrap:focus-within {
            background: #ffffff;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 4px rgba(30, 41, 59, 0.06);
        }

        /* Icon circle inside the input card */
        .input-icon-circle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .input-icon-circle.from-icon {
            background: #f0fdf4;
            border: 1px solid #dcfce7;
            color: #22c55e;
        }

        .input-icon-circle.to-icon {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #ef4444;
        }

        .input-text-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
            overflow: hidden;
        }

        .input-text-area input[type="text"] {
            width: 100%;
            height: 24px;
            min-height: 24px;
            padding: 0;
            border: none;
            background: transparent;
            font-size: 0.92rem;
            font-weight: 600;
            font-family: var(--font);
            color: var(--color-text);
            outline: none;
            cursor: text;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-text-area input[type="text"]::placeholder {
            color: #b0bac8;
            font-weight: 400;
        }

        .input-subtitle {
            font-size: 0.72rem;
            color: #94a3b8;
            margin-top: 1px;
            pointer-events: none;
            line-height: 1;
        }

        /* Suggestions */
        .suggestions-box {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: #ffffff;
            border: 1.5px solid #e8edf4;
            border-radius: 14px;
            max-height: 210px;
            overflow-y: auto;
            z-index: 200;
            box-shadow: 0 12px 36px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.06);
        }

        .suggestion-item {
            padding: 12px 16px;
            font-size: 0.87rem;
            cursor: pointer;
            color: var(--color-text);
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.12s;
        }

        .suggestion-item:first-child { border-radius: 14px 14px 0 0; }
        .suggestion-item:last-child  { border-bottom: none; border-radius: 0 0 14px 14px; }
        .suggestion-item svg { color: #94a3b8; flex-shrink: 0; }
        .suggestion-item:hover { background: #f8fafc; }

        /* Swap button — between From & To */
        #swap-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1.5px solid #e2e8f0;
            background: #ffffff;
            cursor: pointer;
            flex-shrink: 0;
            color: #64748b;
            transition: color 0.2s, border-color 0.2s, box-shadow 0.2s,
                        background 0.2s, transform 0.4s cubic-bezier(.34,1.56,.64,1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 11px; /* vertically centre with input card */
        }

        #swap-btn:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
            background: #f8fafc;
            box-shadow: 0 0 0 5px rgba(30,41,59,0.06), 0 2px 8px rgba(0,0,0,0.08);
            transform: rotate(180deg);
        }

        /* ── Search button ── */
        #search-btn {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.15px;
            transition: box-shadow 0.25s, transform 0.18s;
            box-shadow: 0 4px 18px rgba(15,23,42,0.32), 0 1px 3px rgba(15,23,42,0.2);
            margin-bottom: 20px;
        }

        .search-btn-arrow {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
            transition: opacity 0.2s, transform 0.2s;
        }

        /* Shimmer sweep */
        #search-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.14) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        #search-btn:hover {
            box-shadow: 0 8px 28px rgba(15,23,42,0.42), 0 2px 6px rgba(15,23,42,0.2);
            transform: translateY(-2px);
        }

        #search-btn:hover .search-btn-arrow {
            opacity: 1;
            transform: translateY(-50%) translateX(3px);
        }

        #search-btn:hover::after { transform: translateX(100%); }

        #search-btn:active {
            transform: translateY(0px);
            box-shadow: 0 3px 10px rgba(15,23,42,0.3);
        }

        #search-btn svg { flex-shrink: 0; }


        /* ─── Results Section ─────────────────── */
        .results-section {
            background: var(--color-bg);
            border-top: 1px solid var(--color-border);
            padding: 60px 32px;
        }

        .results-inner {
            max-width: 800px;
            margin: 0 auto;
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .results-header h2 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--color-text);
            letter-spacing: -0.3px;
        }

        .results-count-badge {
            display: inline-flex;
            align-items: center;
            background: var(--color-accent);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 999px;
            letter-spacing: 0.2px;
        }

        #route-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .route-result {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border: 1.5px solid var(--color-border);
            border-left: 4px solid var(--color-accent);
            border-radius: var(--radius);
            cursor: pointer;
            background: var(--color-surface);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s, transform 0.18s;
        }

        .route-result:hover {
            border-color: var(--color-accent);
            background: #f8fafc;
            box-shadow: 0 4px 16px rgba(15,23,42,0.08);
            transform: translateX(4px);
        }

        .route-result-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .route-result-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--color-text);
        }

        .route-result-sub {
            font-size: 0.8rem;
            color: var(--color-text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .route-result-arrow {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            flex-shrink: 0;
            transition: background 0.2s, color 0.2s, transform 0.2s;
        }

        .route-result:hover .route-result-arrow {
            background: var(--color-accent);
            color: #ffffff;
            transform: translateX(2px);
        }

        .no-results {
            text-align: center;
            padding: 52px 20px;
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .no-results svg {
            display: block;
            margin: 0 auto 14px;
            opacity: 0.25;
        }


        /* ─── Footer ─────────────────────────── */
        .footer {
            background: #0a1120;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 22px 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer p {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.25);
        }

        /* ─── Responsive ─────────────────────── */

        /* Laptop: nice wide layout */
        @media (min-width: 1024px) {
            .hero {
                padding: 110px 48px 80px;
            }
            .hero-content {
                max-width: 860px;
            }
            .search-card {
                padding: 36px 36px 32px;
            }
            .results-section {
                padding: 70px 48px;
            }
        }

        /* Tablet: ≤ 768px */
        @media (max-width: 768px) {
            /* Fix iOS Safari fixed-attachment blank screen */
            .hero {
                background-attachment: scroll;
                min-height: 100svh;
                padding: 100px 20px 48px;
            }

            .hero p {
                font-size: 0.93rem;
                margin-bottom: 28px;
            }

            /* Search card tighter on tablet */
            .search-card {
                padding: 20px;
                border-radius: 12px;
            }

            /* Features: 2-col on tablet */
            .features-inner {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }

            /* Results section */
            .results-section {
                padding: 40px 20px;
            }
        }

        /* Mobile: ≤ 540px — unique dark-card aesthetic */
        @media (max-width: 540px) {
            /* ── Hero ── */
            .hero {
                padding: 80px 16px 40px;
                min-height: unset;
                justify-content: flex-start;
            }

            .hero-content { max-width: 100%; }

            .hero-badge {
                font-size: 0.68rem;
                padding: 5px 12px;
                margin-bottom: 16px;
            }

            .hero h1 {
                font-size: clamp(1.5rem, 7vw, 2rem);
                margin-bottom: 10px;
                letter-spacing: -0.6px;
            }

            .hero > .hero-content > p {
                font-size: 0.85rem;
                margin-bottom: 22px;
                line-height: 1.5;
            }

            /* ── Search Card: dark glass on mobile ── */
            .search-card {
                background: rgba(15, 23, 42, 0.88);
                backdrop-filter: blur(28px);
                -webkit-backdrop-filter: blur(28px);
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 22px;
                padding: 22px 18px 20px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            }

            .search-card:focus-within {
                border-color: rgba(255,255,255,0.18);
                box-shadow: 0 24px 68px rgba(0,0,0,0.55);
            }

            .search-card-header { margin-bottom: 18px; }

            .search-card-header-icon {
                background: rgba(255,255,255,0.1);
                border: 1px solid rgba(255,255,255,0.12);
                box-shadow: none;
            }

            .search-card-header-text strong { color: #ffffff; }
            .search-card-header-text span   { color: rgba(255,255,255,0.45); }

            .search-card-status {
                background: rgba(34,197,94,0.12);
                border-color: rgba(34,197,94,0.25);
                color: #4ade80;
            }

            /* Stack From / swap / To vertically */
            .search-row {
                display: flex;
                flex-direction: column;
                gap: 0;
                margin-bottom: 16px;
            }

            .input-group { width: 100%; }

            .input-group label {
                color: rgba(255,255,255,0.5);
                font-size: 0.66rem;
                margin-bottom: 8px;
            }

            .label-dot.from { box-shadow: 0 0 6px rgba(34,197,94,0.5); }
            .label-dot.to   { box-shadow: 0 0 6px rgba(239,68,68,0.5); }

            /* Dark input cards */
            .input-wrap {
                background: rgba(255,255,255,0.06);
                border: 1.5px solid rgba(255,255,255,0.1);
                border-radius: 14px;
                height: 60px;
                padding: 0 16px;
                gap: 12px;
            }

            .input-wrap:hover {
                border-color: rgba(255,255,255,0.18);
            }

            .input-wrap:focus-within {
                background: rgba(255,255,255,0.1);
                border-color: rgba(255,255,255,0.3);
                box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
            }

            .input-icon-circle.from-icon {
                background: rgba(34,197,94,0.12);
                border-color: rgba(34,197,94,0.25);
                color: #4ade80;
            }

            .input-icon-circle.to-icon {
                background: rgba(239,68,68,0.12);
                border-color: rgba(239,68,68,0.25);
                color: #f87171;
            }

            .input-text-area input[type="text"] {
                color: #ffffff;
                font-weight: 500;
            }

            .input-text-area input[type="text"]::placeholder {
                color: rgba(255,255,255,0.3);
            }

            .input-subtitle { color: rgba(255,255,255,0.25); }

            /* Suggestions: dark dropdown */
            .suggestions-box {
                background: #1e293b;
                border-color: rgba(255,255,255,0.1);
                box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            }

            .suggestion-item {
                color: rgba(255,255,255,0.8);
                border-bottom-color: rgba(255,255,255,0.06);
            }

            .suggestion-item svg { color: rgba(255,255,255,0.3); }
            .suggestion-item:hover { background: rgba(255,255,255,0.06); }

            /* Swap: glowing circle */
            #swap-btn {
                margin: 10px auto;
                width: 38px;
                height: 38px;
                border-color: rgba(255,255,255,0.15);
                background: rgba(255,255,255,0.06);
                color: rgba(255,255,255,0.55);
                box-shadow: 0 0 12px rgba(255,255,255,0.04);
                transform: rotate(90deg);
            }

            #swap-btn:hover {
                border-color: rgba(255,255,255,0.3);
                background: rgba(255,255,255,0.1);
                color: #ffffff;
                box-shadow: 0 0 20px rgba(255,255,255,0.08);
                transform: rotate(270deg);
            }

            /* Search button: accent gradient */
            #search-btn {
                height: 52px;
                font-size: 0.92rem;
                border-radius: 14px;
                background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
                box-shadow: 0 4px 18px rgba(37,99,235,0.35);
            }

            #search-btn:hover {
                box-shadow: 0 6px 24px rgba(37,99,235,0.45);
            }

            /* ── Results ── */
            .results-section { padding: 36px 16px; }

            .results-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                margin-bottom: 16px;
            }

            .results-header h2 { font-size: 1.05rem; }

            .route-result {
                padding: 16px 16px;
                transform: none !important;
            }

            .route-result-name { font-size: 0.9rem; }

            /* ── Footer ── */
            .footer { padding: 18px 16px; }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- ─── Hero ──────────────────────────────── -->
    <main class="hero">
        <div class="hero-content">
            <!-- Ambient particles (injected by JS) -->

            <div class="hero-badge">
                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="12" r="10" />
                </svg>
                Live GPS Tracking
            </div>

            <h1>Your journey, <span>tracked precisely.</span></h1>
            <p>Search any route between stops and get real-time bus locations and accurate arrival times.</p>

            <!-- Search Card -->
            <div class="search-card">

                <!-- Card header -->
                <div class="search-card-header">
                    <div class="search-card-header-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
                    </div>
                    <div class="search-card-header-text">
                        <strong>Find Your Route</strong>
                        <span>Search between any two bus stops</span>
                    </div>
                    <div class="search-card-status">Live</div>
                </div>

                <div class="search-row">
                    <!-- From -->
                    <div class="input-group">
                        <label for="from-stop">
                            <span class="label-dot from"></span>
                            FROM
                        </label>
                        <div class="input-wrap">
                            <div class="input-icon-circle from-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
                            </div>
                            <div class="input-text-area">
                                <input type="text" id="from-stop" placeholder="Starting stop" autocomplete="off">
                                <span class="input-subtitle">Enter pickup location</span>
                            </div>
                        </div>
                        <div id="from-suggestions" class="suggestions-box"></div>
                    </div>

                    <!-- Swap -->
                    <button id="swap-btn" title="Swap stops" type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="17 1 21 5 17 9" />
                            <path d="M3 11V9a4 4 0 0 1 4-4h14" />
                            <polyline points="7 23 3 19 7 15" />
                            <path d="M21 13v2a4 4 0 0 1-4 4H3" />
                        </svg>
                    </button>

                    <!-- To -->
                    <div class="input-group">
                        <label for="to-stop">
                            <span class="label-dot to"></span>
                            TO
                        </label>
                        <div class="input-wrap">
                            <div class="input-icon-circle to-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            </div>
                            <div class="input-text-area">
                                <input type="text" id="to-stop" placeholder="Destination stop" autocomplete="off">
                                <span class="input-subtitle">Enter drop-off location</span>
                            </div>
                        </div>
                        <div id="to-suggestions" class="suggestions-box"></div>
                    </div>
                </div>

                <button id="search-btn" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    Search Routes
                    <span class="search-btn-arrow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </span>
                </button>

            </div>
        </div>
    </main>

    <!-- ─── Results Section (shown after search) ── -->
    <section class="results-section" id="results-section" style="display:none;">
        <div class="results-inner">
            <div class="results-header">
                <h2>Available Routes</h2>
                <span id="results-count"></span>
            </div>
            <div id="route-list"></div>
        </div>
    </section>


    <!-- ─── Footer ───────────────────────── -->
    <div id="footer-placeholder"></div>

    <script type="module">
        import { loadNavbar } from '/navbar.js';
        import { loadFooter } from '/footer.js';
        loadNavbar('navbar-placeholder');
        loadFooter('footer-placeholder');

        /* ── Ambient hero particles ── */
        (function spawnParticles() {
            const hero = document.querySelector('.hero');
            const count = 18;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'hero-particle';
                const size = Math.random() * 3 + 1.5;
                p.style.cssText = [
                    `width:${size}px`, `height:${size}px`,
                    `top:${Math.random()*100}%`, `left:${Math.random()*100}%`,
                    `animation-duration:${6 + Math.random()*10}s`,
                    `animation-delay:${-Math.random()*12}s`
                ].join(';');
                hero.appendChild(p);
            }
        })();

        let allRoutes = [], allStopNames = [];
        const fromInput = document.getElementById('from-stop');
        const toInput = document.getElementById('to-stop');
        const swapBtn = document.getElementById('swap-btn');
        const fromSuggest = document.getElementById('from-suggestions');
        const toSuggest = document.getElementById('to-suggestions');
        const searchBtn = document.getElementById('search-btn');
        const routeListDiv = document.getElementById('route-list');
        const resultsSection = document.getElementById('results-section');
        const resultsCount = document.getElementById('results-count');

        const currentYearEl = document.getElementById('current-year');
        if (currentYearEl) currentYearEl.textContent = new Date().getFullYear();

        /* Click anywhere on input-wrap to focus the nested input */
        document.querySelectorAll('.input-wrap').forEach(wrap => {
            wrap.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    const inp = wrap.querySelector('input');
                    if (inp) inp.focus();
                }
            });
        });

        swapBtn.addEventListener('click', () => {
            const v = fromInput.value;
            fromInput.value = toInput.value;
            toInput.value = v;
        });

        async function fetchRoutesAndStops() {
            try {
                const response = await fetch('/api/routes');
                allRoutes = await response.json();
                const stopSet = new Set();
                allRoutes.forEach(r => r.stops.forEach(s => stopSet.add(s.name)));
                allStopNames = Array.from(stopSet);
            } catch (e) { console.error('Failed to fetch routes:', e); }
        }

        function showSuggestions(input, box) {
            const q = input.value.toLowerCase();
            box.innerHTML = '';
            if (!q) { box.style.display = 'none'; return; }
            const filtered = allStopNames.filter(s => s.toLowerCase().includes(q));
            filtered.forEach(stop => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${stop}`;
                item.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    input.value = stop;
                    box.style.display = 'none';
                });
                box.appendChild(item);
            });
            box.style.display = filtered.length > 0 ? 'block' : 'none';
        }

        function searchRoutes() {
            const fromQ = fromInput.value.trim().toLowerCase();
            const toQ = toInput.value.trim().toLowerCase();
            if (!fromQ || !toQ) {
                fromInput.focus();
                return;
            }
            const found = allRoutes.filter(route => {
                const stops = route.stops.map(s => s.name.toLowerCase());
                const fi = stops.findIndex(s => s.includes(fromQ));
                const ti = stops.findIndex(s => s.includes(toQ));
                return fi !== -1 && ti !== -1 && ti > fi;
            });
            displayResults(found);
        }

        function displayResults(routes) {
            routeListDiv.innerHTML = '';
            resultsSection.style.display = 'block';
            window.scrollTo({ top: document.querySelector('.hero').offsetHeight, behavior: 'smooth' });

            if (routes.length === 0) {
                resultsCount.textContent = '0 routes found';
                routeListDiv.innerHTML = `
                    <div class="no-results">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        No routes found between these stops.
                    </div>`;
                return;
            }

            resultsCount.textContent = `${routes.length} route${routes.length > 1 ? 's' : ''} found`;
            routes.forEach(route => {
                const el = document.createElement('div');
                el.className = 'route-result';
                el.innerHTML = `
                    <div class="route-result-info">
                        <span class="route-result-name">${route.name}</span>
                        <span class="route-result-sub">${route.stops.length} stops</span>
                    </div>
                    <span class="route-result-arrow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </span>`;
                el.addEventListener('click', () => {
                    const url = `tracking?routeId=${route.id}&from=${encodeURIComponent(fromInput.value)}&to=${encodeURIComponent(toInput.value)}`;
                    window.location.href = url;
                });
                routeListDiv.appendChild(el);
            });
        }

        searchBtn.addEventListener('click', searchRoutes);
        fromInput.addEventListener('keydown', e => { if (e.key === 'Enter') searchRoutes(); });
        toInput.addEventListener('keydown', e => { if (e.key === 'Enter') searchRoutes(); });
        fromInput.addEventListener('input', () => showSuggestions(fromInput, fromSuggest));
        toInput.addEventListener('input', () => showSuggestions(toInput, toSuggest));
        document.addEventListener('click', (e) => {
            if (e.target !== fromInput) fromSuggest.style.display = 'none';
            if (e.target !== toInput) toSuggest.style.display = 'none';
        });

        fetchRoutesAndStops();
    </script>
</body>

</html>
