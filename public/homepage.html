<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lok Yatra - Live Bus Tracking</title>
    <style>
        /* --- Basic Reset & Global Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* --- Hero Section (Main Content) --- */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 90vh;
            padding: 20px;
            position: relative;
            background-image: linear-gradient(to top, #a18cd1 0%, #fbc2eb 100%);
            background-size: cover;
            background-position: center;
        }

        /* Dark overlay for better text readability */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        /* --- ENHANCED Search Container --- */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .search-container h1 {
            margin-bottom: 10px;
            font-size: 2.2em;
            color: #333;
        }

        .search-container p {
            margin-bottom: 30px;
            font-size: 1.1em;
            color: #666;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            position: relative;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            position: relative;
            width: 100%;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 15px;
            color: #aaa;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            /* Left padding for icon */
            font-size: 1.1em;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        #swap-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 5;
        }

        #swap-btn:hover {
            transform: translate(-50%, -50%) rotate(180deg);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #search-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            background-image: linear-gradient(to right, #3498db, #2980b9);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        #search-btn:hover {
            transform: scale(1.02);
        }

        #route-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .route-result {
            text-align: left;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .suggestions-box {
            display: none;
            text-align: left;
            position: absolute;
            width: 100%;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 10;
        }

        .suggestion-item {
            padding: 12px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background-color: #f0f0f0;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background-color: #2c3e50;
            color: white;
        }

        /* Responsive adjustments */
        @media (max-width: 700px) {
            .input-wrapper {
                flex-direction: column;
                gap: 20px;
                margin-bottom: 20px;
            }

            #swap-btn {
                top: 50%;
                right: -20px;
                left: auto;
                transform: translateY(-50%) rotate(90deg);
            }

            #swap-btn:hover {
                transform: translateY(-50%) rotate(270deg);
            }
        }

        @media (max-width: 480px) {
            .search-container {
                padding: 20px;
            }

            .search-container h1 {
                font-size: 1.8em;
            }

            .search-container p {
                font-size: 1em;
            }

            input {
                padding: 12px 12px 12px 45px;
                font-size: 1em;
            }

            .hero {
                min-height: 85vh;
            }
        }
    </style>
</head>

<body>
    <!-- The navbar is now loaded into this placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="hero">
        <div class="search-container">
            <h1>Welcome to Lok Yatra</h1>
            <p>Track your public transport in real-time.</p>
            <div class="input-wrapper">
                <div class="form-group">
                    <span class="input-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <circle cx="12" cy="12" r="4"></circle>
                        </svg></span>
                    <input type="text" id="from-stop" placeholder="Starting Point" autocomplete="off">
                    <div id="from-suggestions" class="suggestions-box"></div>
                </div>
                <button id="swap-btn" title="Swap locations"><svg xmlns="http://www.w3.org/2000/svg" width="20"
                        height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <polyline points="19 12 12 19 5 12"></polyline>
                    </svg></button>
                <div class="form-group">
                    <span class="input-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg></span>
                    <input type="text" id="to-stop" placeholder="Destination" autocomplete="off">
                    <div id="to-suggestions" class="suggestions-box"></div>
                </div>
            </div>
            <button id="search-btn"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>Search Routes</button>
            <div id="route-list"></div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; <span id="current-year"></span> Lok Yatra. All Rights Reserved.</p>
    </footer>

    <!-- Use type="module" to allow imports -->
    <script type="module">
        // 1. Import the navbar loader
        import { loadNavbar } from '/navbar.js';

        // 2. Load the navbar into the placeholder
        loadNavbar('navbar-placeholder');

        // 3. All logic specific to THIS page runs here
        let allRoutes = [], allStopNames = [];
        const fromInput = document.getElementById('from-stop');
        const toInput = document.getElementById('to-stop');
        const swapBtn = document.getElementById('swap-btn');
        const fromSuggestions = document.getElementById('from-suggestions');
        const toSuggestions = document.getElementById('to-suggestions');
        const searchBtn = document.getElementById('search-btn');
        const routeListDiv = document.getElementById('route-list');
        document.getElementById('current-year').textContent = new Date().getFullYear();

        swapBtn.addEventListener('click', () => {
            const fromValue = fromInput.value;
            fromInput.value = toInput.value;
            toInput.value = fromValue;
        });

        async function fetchRoutesAndStops() {
            try {
                const response = await fetch('/api/routes');
                allRoutes = await response.json();
                const stopSet = new Set();
                allRoutes.forEach(route => { route.stops.forEach(stop => stopSet.add(stop.name)); });
                allStopNames = Array.from(stopSet);
            } catch (error) { console.error('Failed to fetch routes:', error); }
        }

        function showSuggestions(input, box) {
            const query = input.value.toLowerCase();
            box.innerHTML = '';
            if (!query) { box.style.display = 'none'; return; }
            const filtered = allStopNames.filter(s => s.toLowerCase().includes(query));
            filtered.forEach(stop => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.textContent = stop;
                item.addEventListener('click', () => {
                    input.value = stop;
                    box.style.display = 'none';
                });
                box.appendChild(item);
            });
            box.style.display = filtered.length > 0 ? 'block' : 'none';
        }

        function searchRoutes() {
            const fromQuery = fromInput.value.trim().toLowerCase();
            const toQuery = toInput.value.trim().toLowerCase();
            if (!fromQuery || !toQuery) return alert('Please enter both locations.');
            const foundRoutes = allRoutes.filter(route => {
                const stops = route.stops.map(s => s.name.toLowerCase());
                const fromIndex = stops.findIndex(s => s.includes(fromQuery));
                const toIndex = stops.findIndex(s => s.includes(toQuery));
                return fromIndex !== -1 && toIndex !== -1 && toIndex > fromIndex;
            });
            displaySearchResults(foundRoutes);
        }

        function displaySearchResults(routes) {
            routeListDiv.innerHTML = '';
            if (routes.length === 0) {
                routeListDiv.innerHTML = '<p style="margin-top: 15px;">No matching routes found.</p>';
                return;
            }
            routes.forEach(route => {
                const el = document.createElement('div');
                el.className = 'route-result';
                el.textContent = route.name;
                el.onclick = () => navigateToTrackingPage(route);
                routeListDiv.appendChild(el);
            });
        }

        function navigateToTrackingPage(route) {
            const from = fromInput.value;
            const to = toInput.value;
            const url = `tracking.html?routeId=${route.id}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
            window.location.href = url;
        }

        searchBtn.addEventListener('click', searchRoutes);
        fromInput.addEventListener('input', () => showSuggestions(fromInput, fromSuggestions));
        toInput.addEventListener('input', () => showSuggestions(toInput, toSuggestions));
        document.addEventListener('click', (e) => {
            if (e.target !== fromInput) fromSuggestions.style.display = 'none';
            if (e.target !== toInput) toSuggestions.style.display = 'none';
        });

        fetchRoutesAndStops();
    </script>
</body>

</html>
