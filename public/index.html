<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lok Yatra</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .login-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
        }

        /* --- Image Panel (Left Side) --- */
        .image-panel {
            background-image: url('/images/login-bg.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 50px;
            color: white;
        }

        .image-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
        }

        .image-panel .content {
            position: relative;
            z-index: 2;
        }

        .image-panel h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .image-panel p {
            font-size: 1.2em;
            max-width: 400px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* --- Form Panel (Right Side) --- */
        .form-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: #f0f2f5;
        }

        .login-card {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            height: 45px;
            width: auto;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 1em;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: none;
            background-color: #3498db;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2980b9;
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .toggle-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #3498db;
            text-decoration: none;
            cursor: pointer;
            font-size: 0.9em;
        }

        .toggle-link:hover {
            text-decoration: underline;
        }

        #error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            min-height: 1.2em;
            font-size: 0.9em;
        }

        /* --- Responsive Design --- */
        @media (max-width: 800px) {
            .login-container {
                grid-template-columns: 1fr;
                /* Stack the panels */
            }

            .image-panel {
                display: none;
                /* Hide the image on mobile to save space */
            }

            .form-panel {
                background-color: white;
                /* Make the form panel white on mobile */
                align-items: flex-start;
                padding-top: 50px;
            }

            .login-card {
                box-shadow: none;
                /* Remove shadow when it's full screen */
            }
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="image-panel">
            <div class="content">
                <h1>Your Journey,</h1>
                <p>in Real-Time.</p>
            </div>
        </div>
        <div class="form-panel">
            <div class="login-card">
                <div class="logo-container">
                    <img src="/images/logo.png" alt="Lok Yatra Logo">
                </div>

                <!-- Passenger Form -->
                <div id="passenger-form-container" class="form-container active">
                    <h2>Welcome Aboard</h2>
                    <form id="passenger-login-form">
                        <p style="text-align: center; color: #666; margin-bottom: 20px;">Enter your phone number to find
                            your bus.</p>
                        <input type="tel" id="phoneNumber" placeholder="10-Digit Phone Number" required
                            pattern="[0-9]{10}">
                        <button type="submit">Continue</button>
                    </form>
                    <a id="show-staff-login" class="toggle-link">Staff Member? Login here</a>
                </div>

                <!-- Staff Form -->
                <div id="staff-form-container" class="form-container">
                    <h2>Staff Login</h2>
                    <form id="staff-login-form">
                        <input type="text" id="username" placeholder="Username" required>
                        <input type="password" id="password" placeholder="Password" required>
                        <button type="submit">Login</button>
                    </form>
                    <a id="show-passenger-login" class="toggle-link">Not a staff member? Go back</a>
                </div>

                <p id="error-message"></p>
            </div>
        </div>
    </div>

    <script>
        const passengerFormContainer = document.getElementById('passenger-form-container');
        const staffFormContainer = document.getElementById('staff-form-container');
        const showStaffLoginLink = document.getElementById('show-staff-login');
        const showPassengerLoginLink = document.getElementById('show-passenger-login');
        const passengerLoginForm = document.getElementById('passenger-login-form');
        const staffLoginForm = document.getElementById('staff-login-form');
        const phoneNumberInput = document.getElementById('phoneNumber');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('error-message');

        showStaffLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            passengerFormContainer.classList.remove('active');
            staffFormContainer.classList.add('active');
            errorMessage.textContent = '';
        });

        showPassengerLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            staffFormContainer.classList.remove('active');
            passengerFormContainer.classList.add('active');
            errorMessage.textContent = '';
        });

        passengerLoginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.textContent = '';
            const phoneNumber = phoneNumberInput.value;
            try {
                const response = await fetch('/api/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Login failed.');
                localStorage.setItem('authToken', data.token);
                window.location.href = '/homepage.html'; // Redirect to the new homepage
            } catch (error) {
                errorMessage.textContent = error.message;
            }
        });

        staffLoginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.textContent = '';
            const username = usernameInput.value;
            const password = passwordInput.value;
            try {
                const response = await fetch('/api/staff/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Login failed.');
                localStorage.setItem('authToken', data.token);
                window.location.href = '/bus.html'; // Redirect to the staff dashboard
            } catch (error) {
                errorMessage.textContent = error.message;
            }
        });
    </script>
</body>

</html>
