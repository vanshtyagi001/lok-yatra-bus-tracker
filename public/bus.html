<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #2c3e50; color: white; }
        .header h1 { margin: 0; font-size: 1.2em; }
        .header button { background-color: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .main-content { text-align: center; padding: 20px; }
        #status { font-size: 1.2em; font-weight: bold; margin-bottom: 15px; }
        .success { color: green; } .error { color: red; } .warning { color: orange; }
        
        /* The tracking UI elements are all hidden by default */
        #live-coords, #map-container { display: none; }
        #live-coords { padding: 10px; background-color: #f4f4f4; max-width: 600px; margin: 0 auto 15px auto; border-radius: 5px; border: 1px solid #ddd; font-family: monospace; font-size: 1.1em; }
        #map { height: 40vh; width: 100%; max-width: 600px; margin: 0 auto; border-top: 2px solid #ccc; }

        /* Style for the new "Start" button */
        #start-tracking-btn {
            display: none; /* Hidden by default */
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            background-color: #27ae60; /* Green */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        #sms-fallback-banner {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(150%);
            width: 90%;
            max-width: 420px;
            background: #ffffff;
            color: #1e293b;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            z-index: 10000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1), 0 4px 10px rgba(0,0,0,0.05);
            border-top: 4px solid #dc2626;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            visibility: hidden;
            font-family: 'Inter', sans-serif;
        }

        #sms-fallback-banner.show {
            transform: translateX(-50%) translateY(0);
            visibility: visible;
        }

        .sms-banner-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sms-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #fef2f2;
            color: #dc2626;
            margin-bottom: 12px;
        }

        .sms-banner-content h3 {
            margin: 0 0 8px 0;
            font-size: 1.25em;
            color: #0f172a;
            font-weight: 600;
        }

        .sms-banner-content p {
            font-size: 0.9em;
            color: #64748b;
            margin: 0 0 20px 0;
            line-height: 1.5;
        }

        .sms-send-btn {
            background: #1e293b;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
            gap: 8px;
        }

        .sms-send-btn:hover {
            background: #0f172a;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="welcome-message">Loading...</h1>
        <button id="logout-btn">Logout</button>
    </div>
    <div class="main-content">
        <p id="status">Authenticating...</p>

        <!-- The new "Start" button goes here -->
        <button id="start-tracking-btn"></button>

        <!-- The tracking UI goes here -->
        <div id="live-coords"></div>
        <button id="manual-sms-btn" class="sms-send-btn" style="display: none; margin: 15px auto; width: 100%; max-width: 600px; background: #2c3e50;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            Send Manual SMS Update
        </button>
        <p id="manual-sms-status" style="display: none; margin-bottom: 15px; font-size: 0.9em; color: #27ae60; text-align: center;"></p>
        <div id="map-container"><div id="map"></div></div>

        <!-- SMS Fallback Banner -->
        <div id="sms-fallback-banner">
            <div class="sms-banner-content">
                <div class="sms-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="2" x2="22" y2="22"></line><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path><path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
                </div>
                <h3>No Internet Connection</h3>
                <p>Your location updates are paused. Send your current location via SMS to keep tracking alive.</p>
                <button id="send-sms-btn" class="sms-send-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    Send Location via SMS
                </button>
                <p id="sms-status" class="sms-status-text" style="margin-top: 12px; font-size: 0.85em; color: #64748b; height: 16px;"></p>
            </div>
        </div>
    </div>
    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/map-boundary.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const welcomeMessage = document.getElementById('welcome-message');
        const statusElement = document.getElementById('status');
        const startTrackingBtn = document.getElementById('start-tracking-btn');
        const liveCoords = document.getElementById('live-coords');
        const mapContainer = document.getElementById('map-container');
        const logoutBtn = document.getElementById('logout-btn');
        const manualSmsBtn = document.getElementById('manual-sms-btn');
        const manualSmsStatus = document.getElementById('manual-sms-status');

        let SMS_SERVER_NUMBER = '';
        let isOnline = navigator.onLine;
        let lastKnownPosition = { lat: null, lng: null, heading: null };
        let activeBusId = null;

        function showSmsPrompt() {
            document.getElementById('sms-fallback-banner').classList.add('show');
        }

        function hideSmsPrompt() {
            document.getElementById('sms-fallback-banner').classList.remove('show');
            document.getElementById('sms-status').textContent = '';
        }

        document.getElementById('send-sms-btn').addEventListener('click', () => {
            if (lastKnownPosition.lat !== null && activeBusId !== null) {
                const timestamp = Math.floor(Date.now() / 1000);
                const headingVal = lastKnownPosition.heading !== null && lastKnownPosition.heading !== undefined ? lastKnownPosition.heading.toFixed(1) : '0';
                
                const smsBody = `TS|${activeBusId}|${lastKnownPosition.lat.toFixed(6)}|${lastKnownPosition.lng.toFixed(6)}|${headingVal}|${timestamp}`;
                
                const smsUri = `sms:${SMS_SERVER_NUMBER}?body=${encodeURIComponent(smsBody)}`;
                window.location.href = smsUri;
                
                document.getElementById('sms-status').textContent = 'SMS app opened. Please tap Send.';
            } else {
                document.getElementById('sms-status').textContent = 'No GPS position available yet.';
            }
        });

        manualSmsBtn.addEventListener('click', () => {
            if (lastKnownPosition.lat !== null && activeBusId !== null) {
                const timestamp = Math.floor(Date.now() / 1000);
                const headingVal = lastKnownPosition.heading !== null && lastKnownPosition.heading !== undefined ? lastKnownPosition.heading.toFixed(1) : '0';
                
                const smsBody = `TS|${activeBusId}|${lastKnownPosition.lat.toFixed(6)}|${lastKnownPosition.lng.toFixed(6)}|${headingVal}|${timestamp}`;
                
                const smsUri = `sms:${SMS_SERVER_NUMBER}?body=${encodeURIComponent(smsBody)}`;
                window.location.href = smsUri;
                
                manualSmsStatus.style.display = 'block';
                manualSmsStatus.textContent = 'SMS app opened. Please tap Send.';
            } else {
                manualSmsStatus.style.display = 'block';
                manualSmsStatus.textContent = 'No GPS position available yet.';
            }
        });

        // Heartbeat logic
        let heartbeatInterval;
        let missedHeartbeats = 0;
        const MAX_MISSED = 2; // 2 consecutive misses = offline

        function startHeartbeat() {
            heartbeatInterval = setInterval(async () => {
                try {
                    const resp = await fetch('/api/ping', { 
                        method: 'GET',
                        signal: AbortSignal.timeout(3000)
                    });
                    if (resp.ok) {
                        missedHeartbeats = 0;
                        if (!isOnline) {
                            isOnline = true;
                            hideSmsPrompt();
                        }
                    }
                } catch {
                    missedHeartbeats++;
                    if (missedHeartbeats >= MAX_MISSED) {
                        if (isOnline) {
                            isOnline = false;
                            showSmsPrompt();
                        }
                    }
                }
            }, 5000);
        }

        window.addEventListener('offline', () => {
            isOnline = false;
            showSmsPrompt();
        });

        window.addEventListener('online', () => {
            // Heartbeat will confirm and hide prompt
        });

        async function initializeDashboard() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = '/';
                return;
            }

            try {
                const smsConfig = await fetch('/api/config/sms-number');
                if (smsConfig.ok) {
                    const { phoneNumber } = await smsConfig.json();
                    SMS_SERVER_NUMBER = phoneNumber;
                }
            } catch (e) {
                console.warn('Could not load SMS server number config');
            }

            try {
                const response = await fetch('/api/staff/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Authentication failed.');

                const data = await response.json();
                const { staff, assignedBus } = data;

                welcomeMessage.textContent = `Welcome, ${staff.name}!`;

                if (assignedBus) {
                    // STEP 1: Show the assignment and the "Start" button
                    statusElement.textContent = `You are assigned to Bus: ${assignedBus.busNumber}`;
                    startTrackingBtn.textContent = `Start Live Tracking for ${assignedBus.busNumber}`;
                    startTrackingBtn.style.display = 'block';

                    // STEP 2: Add a listener that waits for the user to click the button
                    startTrackingBtn.addEventListener('click', () => {
                        // STEP 3: Hide the button and show the tracking UI
                        startTrackingBtn.style.display = 'none';
                        liveCoords.style.display = 'block';
                        manualSmsBtn.style.display = 'flex';
                        mapContainer.style.display = 'block';
                        // Finally, start the GPS tracking
                        activeBusId = assignedBus.busNumber;
                        startTracking(assignedBus.busNumber);
                        startHeartbeat();
                    }, { once: true }); // { once: true } is a safety to prevent multiple clicks

                } else {
                    statusElement.textContent = 'You are not currently assigned to a bus.';
                    statusElement.className = 'warning';
                }
            } catch (error) {
                localStorage.removeItem('authToken');
                window.location.href = '/';
            }
        }

        function startTracking(busId) {
            // This function contains all the GPS and map logic from before.
            // It is now ONLY called when the user clicks the "Start" button.
            const ACCURACY_THRESHOLD_METERS = 30;
            const SMOOTHING_BUFFER_SIZE = 5;
            const locationBuffer = [];
            let map = null, busMarker = null;

            const socket = io();
            navigator.geolocation.watchPosition((position) => {
                if (position.coords.accuracy > ACCURACY_THRESHOLD_METERS) {
                    statusElement.textContent = `Waiting for a more accurate GPS signal...`;
                    statusElement.className = 'warning';
                    return;
                }
                locationBuffer.push(position.coords);
                if (locationBuffer.length > SMOOTHING_BUFFER_SIZE) locationBuffer.shift();
                
                let avgLat = 0, avgLng = 0;
                locationBuffer.forEach(p => { avgLat += p.latitude; avgLng += p.longitude; });
                const latitude = avgLat / locationBuffer.length;
                const longitude = avgLng / locationBuffer.length;
                
                lastKnownPosition = { lat: latitude, lng: longitude, heading: position.coords.heading };

                if (isOnline) {
                    socket.emit('updateLocation', { busId, lat: latitude, lng: longitude, heading: position.coords.heading });
                }
                
                statusElement.textContent = `Tracking Active for Bus ${busId}`;
                statusElement.className = 'success';
                liveCoords.innerHTML = `Lat: ${latitude.toFixed(6)} <br> Lng: ${longitude.toFixed(6)}`;

                const currentLatLng = [latitude, longitude];
                if (!map) {
                    map = L.map('map').setView(currentLatLng, 16);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    if (window.addIndiaBoundary) {
                        window.addIndiaBoundary(map);
                    }
                    busMarker = L.marker(currentLatLng).addTo(map).bindPopup(`<b>Bus ${busId}</b>`).openPopup();
                } else {
                    busMarker.setLatLng(currentLatLng);
                    map.panTo(currentLatLng);
                }
            }, (error) => {
                statusElement.textContent = `Error: ${error.message}`;
                statusElement.className = 'error';
            }, { enableHighAccuracy: true });
        }

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('authToken');
            window.location.href = '/';
        });

        initializeDashboard();
    </script>
    <script type="module">
        import { loadFooter } from '/footer.js';
        loadFooter('footer-placeholder');
    </script>
</body>
</html>
